version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: imagesr_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imagesr_backend
    env_file: .env
    volumes:
      - ./backend:/app
      - ./src:/app/src
      - ./models:/app/models
      - session_storage:/tmp/imagesr
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: imagesr_worker
    env_file: .env
    volumes:
      - ./backend:/app
      - ./src:/app/src
      - ./models:/app/models
      - session_storage:/tmp/imagesr
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    command: celery -A worker worker --loglevel=info --concurrency=1
  
  frontend:
    image: node:20-alpine
    container_name: imagesr_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"        # Vite default port
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: imagesr_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  session_storage:
services:
  redis:
    image: redis:7-alpine
    container_name: imagesr_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./ml_backend
      dockerfile: Dockerfile
    container_name: imagesr_backend
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./ml_backend:/app
      - ./src:/app/src
      - ./ml_backend/models:/app/models
      - session_storage:/tmp/imagesr
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    container_name: imagesr_worker
    env_file: .env
    environment:
      # We include /app (root) so it finds src/ and models/
      # We include /app/ml_backend so it finds worker.py
      - PYTHONPATH=/app:/app/ml_backend
    volumes:
      - .:/app
      - ./ml_backend/models:/app/models
      - session_storage:/tmp/imagesr
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    # Using the module path relative to PYTHONPATH
    command: celery -A ml_backend.worker worker --loglevel=info --concurrency=1

  node_backend:
    build:
      context: ./node_backend
      dockerfile: Dockerfile
    container_name: imagesr_node
    volumes:
      - ./node_backend:/app
      - /app/node_modules
    environment:
      - ML_SERVICE_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: imagesr_frontend
    working_dir: /app
    environment:
      VITE_API_TARGET: http://node_backend:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"        
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - node_backend

  nginx:
    image: nginx:alpine
    container_name: imagesr_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  session_storage:

server {
    
    listen 80;

    # Proxy to Vite dev server (supports HMR WebSocket upgrades)
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy frontend-facing async job API through the Node gateway
    location ~ ^/(enhance|status|result)(/|$) {
        proxy_pass http://node_backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        client_max_body_size 20M;
        proxy_read_timeout 600s;
    }

    location /api/images/ {
        proxy_pass http://node_backend:5000/api/images/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        client_max_body_size 20M;
        proxy_read_timeout 600s;
    }

    # Keep direct FastAPI API access available for backend-only endpoints
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        client_max_body_size 20M;
        proxy_read_timeout 600s;
    }
}

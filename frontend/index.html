<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImageSR | AI Precision Upscaling</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Geist:wght@600;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0b1020;
        color: #e6e0ee;
        overflow-x: hidden;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-panel {
        background: rgba(26, 34, 68, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(42, 53, 97, 0.5);
      }
      .inner-glow-border {
        position: relative;
      }
      .inner-glow-border::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(124, 92, 255, 0.3),
          rgba(93, 230, 255, 0.3)
        );
        -webkit-mask: linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      .scanning-effect {
        position: relative;
        overflow: hidden;
      }
      .scanning-line {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #5de6ff, transparent);
        box-shadow: 0 0 15px #5de6ff;
        z-index: 10;
      }
      .glow-border {
        box-shadow: 0 0 15px rgba(124, 92, 255, 0.1);
        border: 1px solid rgba(148, 125, 255, 0.3);
      }
      .scanline {
        animation: scan 3s linear infinite;
      }
      @keyframes scan {
        0% {
          top: 0%;
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          top: 100%;
          opacity: 0;
        }
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'surface-bright': '#3a3842',
              'surface-container-low': '#1c1a24',
              'on-primary': '#31009a',
              'tertiary-fixed-dim': '#ffb780',
              tertiary: '#ffb780',
              'surface-variant': '#36333e',
              'inverse-surface': '#e6e0ee',

              'on-tertiary-fixed-variant': '#6f3800',
              'primary-container': '#947dff',
              'on-surface-variant': '#c9c4d8',
              'inverse-primary': '#603ce2',
              surface: '#14121b',
              'on-secondary-fixed': '#001f25',
              'secondary-fixed-dim': '#2fd9f4',
              'primary-fixed-dim': '#cabeff',
              'surface-container': '#201e28',
              'on-error-container': '#ffdad6',
              'outline-variant': '#484555',
              'on-background': '#e6e0ee',
              'surface-container-high': '#2b2933',
              primary: '#cabeff',
              'on-secondary-container': '#00515d',
              'secondary-fixed': '#a2eeff',
              background: '#14121b',
              outline: '#938ea1',
              'on-secondary-fixed-variant': '#004e5a',
              secondary: '#5de6ff',
              'inverse-on-surface': '#312f39',
              'on-tertiary': '#4e2600',
              error: '#ffb4ab',
              'on-primary-fixed': '#1c0062',
              'on-surface': '#e6e0ee',
              'surface-tint': '#cabeff',
              'tertiary-container': '#d7791f',
              'surface-dim': '#14121b',
              'on-primary-fixed-variant': '#4816cb',
              'on-secondary': '#00363e',
              'surface-container-lowest': '#0f0d16',
              'secondary-container': '#00cbe6',
              'on-tertiary-fixed': '#2f1400',
              'tertiary-fixed': '#ffdcc4',
              'surface-container-highest': '#36333e',
              'on-error': '#690005',
              'primary-fixed': '#e6deff',
              'on-primary-container': '#2a0088',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            spacing: {
              xl: '64px',

              sm: '16px',
              lg: '40px',

              md: '24px',
              gutter: '20px',
